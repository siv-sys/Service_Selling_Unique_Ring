<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BondKeeper · Thank you</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1&display=swap" rel="stylesheet">
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#ff2aa2',
            cream: '#faf6f2',
            charcoal: '#1e1b1a',
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
            serif: ['Cormorant Garamond', 'serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .heading-serif { font-family: 'Cormorant Garamond', serif; }
    .premium-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    /* beautiful modal animation */
    .modal-backdrop {
      transition: opacity 0.3s ease;
    }
    .modal-content {
      transform: scale(0.95);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .modal-show .modal-content {
      transform: scale(1);
    }
  </style>
</head>
<body class="bg-cream dark:bg-charcoal text-charcoal dark:text-cream/90 antialiased min-h-screen flex items-center justify-center">
  <!-- sample content (just to demonstrate modal) -->
  <div class="text-center p-12">
    <button id="demo-purchase-btn" class="bg-primary text-white px-12 py-5 rounded-full text-lg font-bold shadow-xl hover:bg-primary/80 transition-all flex items-center gap-3 mx-auto">
      <span>Simulate purchase</span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </button>
    <p class="text-slate-500 mt-6">Click to see the beautiful thank‑you modal.</p>
  </div>

  <!-- BEAUTIFUL CUSTOM MODAL (hidden by default) -->
  <div id="successModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop opacity-0 pointer-events-none transition-opacity duration-300">
    <!-- backdrop with blur -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <!-- modal card -->
    <div class="relative bg-white dark:bg-charcoal rounded-3xl max-w-lg w-full p-8 shadow-2xl border border-primary/20 modal-content opacity-0 translate-y-4 transition-all duration-300">
      <!-- close button (optional) -->
      <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-primary transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
      
      <!-- success icon with animation -->
      <div class="flex justify-center mb-6">
        <div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center text-primary animate-pulse">
          <span class="material-symbols-outlined text-5xl">celebration</span>
        </div>
      </div>

      <!-- thank you heading -->
      <h2 class="heading-serif text-4xl font-bold text-center text-primary">Thank you!</h2>
      <p class="text-center text-slate-600 dark:text-cream/70 mt-2">Your bond is now forever registered.</p>

      <!-- purchase details (dynamic) -->
      <div id="modalDetails" class="mt-8 bg-primary/5 rounded-2xl p-6 space-y-3 text-sm border border-primary/10">
        <!-- filled by js -->
      </div>

      <!-- heartwarming message -->
      <div class="mt-6 text-center text-slate-500 dark:text-cream/60 italic">
        “Every great love story starts with a single step.<br> Yours is now etched in eternity.”
      </div>

      <!-- action button -->
      <div class="mt-8 flex justify-center">
        <a href="./profile.html" class="bg-primary text-white px-8 py-4 rounded-full font-bold hover:bg-primary/80 transition-all flex items-center gap-2 shadow-lg">
          <span>View your couple profile</span>
          <span class="material-symbols-outlined">favorite</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const modal = document.getElementById('successModal');
      const modalBackdrop = modal.querySelector('.modal-backdrop');
      const modalContent = modal.querySelector('.modal-content');
      const modalDetails = document.getElementById('modalDetails');
      const closeBtn = document.getElementById('closeModalBtn');

      // function to show modal with custom data
      function showThankYouModal(data) {
        // populate details
        modalDetails.innerHTML = `
          <div class="flex justify-between"><span class="text-slate-500">Couple</span><span class="font-bold">${data.partner1} & ${data.partner2}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">Ring</span><span class="font-bold">${data.ring} (${data.sku})</span></div>
          <div class="flex justify-between"><span class="text-slate-500">Total paid</span><span class="font-bold text-primary">$${data.price}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">Stock left</span><span class="font-bold">${data.newStock}</span></div>
          <div class="flex justify-between"><span class="text-slate-500">Purchase date</span><span class="font-bold">${data.date}</span></div>
        `;

        // show modal with transitions
        modal.classList.remove('opacity-0', 'pointer-events-none');
        modal.classList.add('opacity-100', 'pointer-events-auto');
        
        // small delay for inner animation
        setTimeout(() => {
          modalContent.classList.remove('opacity-0', 'translate-y-4');
          modalContent.classList.add('opacity-100', 'translate-y-0');
        }, 10);
      }

      // close modal
      function closeModal() {
        modalContent.classList.add('opacity-0', 'translate-y-4');
        modalContent.classList.remove('opacity-100', 'translate-y-0');
        setTimeout(() => {
          modal.classList.add('opacity-0', 'pointer-events-none');
          modal.classList.remove('opacity-100', 'pointer-events-auto');
        }, 200);
      }

      closeBtn.addEventListener('click', closeModal);
      // click outside to close (optional)
      modal.addEventListener('click', function(e) {
        if (e.target === modal || e.target.classList.contains('modal-backdrop')) {
          closeModal();
        }
      });

      // --- simulate purchase (replace with your actual purchase logic) ---
      const demoBtn = document.getElementById('demo-purchase-btn');
      if (demoBtn) {
        demoBtn.addEventListener('click', function(e) {
          e.preventDefault();

          // This is exactly your purchase code snippet, adapted to call the modal
          const ringPrice = 899;
          let stockInput = { value: 3 }; // mock
          let newStock = 2; // after decrease

          // Mock data that would come from your form
          const coupleProfile = {
            id: 'CP' + Math.floor(Math.random()*10000),
            partner1: 'Alex Rivera',
            partner2: 'Sam Rivera',
            email: 'couple@bondkeeper.com',
            phone: '+855 12 345 678',
            address: '#123, Street 456, Phnom Penh, Cambodia',
            ring: 'Twin Souls Silver B',
            sku: 'TSS-002-X9',
            price: ringPrice,
            purchaseDate: new Date().toLocaleDateString(),
          };

          // Simulate stock decrease
          // let newStock = stock - 1; // you would have real stock value

          // Store in session
          sessionStorage.setItem('bondKeeper_couple', JSON.stringify(coupleProfile));
          localStorage.removeItem('cart');

          // Instead of alert, call the beautiful modal
          showThankYouModal({
            partner1: coupleProfile.partner1,
            partner2: coupleProfile.partner2,
            ring: coupleProfile.ring,
            sku: coupleProfile.sku,
            price: coupleProfile.price,
            newStock: newStock,
            date: coupleProfile.purchaseDate,
          });

          // Optional: disable button, etc.
          demoBtn.disabled = true;
          demoBtn.classList.add('opacity-50', 'cursor-not-allowed');
          demoBtn.innerHTML = `<span>Purchase completed</span> <span class="material-symbols-outlined">check_circle</span>`;
        });
      }

      // If you want to integrate this into your actual purchase flow,
      // replace the alert with: showThankYouModal({ ... }) using the same data structure.
    })();
  </script>
</body>
</html>
